services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    env_file:
      - .env
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    volumes:
      - '.:/var/www/html'
      - "phpsocket:/var/run"
    networks:
      - jotup
    depends_on:
      - pgsql
#  swoole:
#    build:
#      context: .
#      dockerfile: docker/swoole/Dockerfile
#    ports:
#      - '9501:9501'
#    env_file:
#      - .env
#    extra_hosts:
#      - 'host.docker.internal:host-gateway'
#    volumes:
#      - '.:/var/www/html'
#    networks:
#      - jotup
#    depends_on:
#      - pgsql
  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    ports:
      - '${APP_PORT:-80}:80'
    volumes:
      - "phpsocket:/var/run"
#      - ./:/app
    depends_on:
      - app
    networks:
      - jotup
  pgsql:
    image: 'postgres:17'
    ports:
      - '${FORWARD_DB_PORT:-5432}:5432'
    environment:
      PGPASSWORD: '${DB_PASSWORD:-secret}'
      POSTGRES_DB: '${DB_DATABASE}'
      POSTGRES_USER: '${DB_USERNAME}'
      DB_USER: '${DB_USERNAME}'
      POSTGRES_PASSWORD: '${DB_PASSWORD:-secret}'
    volumes:
      - 'app-pgsql:/var/lib/postgresql/data'
    networks:
      - jotup
    healthcheck:
      test:
        - CMD
        - pg_isready
        - '-q'
        - '-d'
        - '${DB_DATABASE}'
        - '-U'
        - '${DB_USERNAME}'
      retries: 3
      timeout: 5s
networks:
  jotup:
    driver: bridge
volumes:
  app-pgsql:
    driver: local
  phpsocket:
